<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Dungeon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8px 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            flex-shrink: 0;
        }

        .title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f85149;
            letter-spacing: 0.5px;
        }

        .room-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 4px 10px;
        }

        .room-box label {
            font-size: 0.65rem;
            color: #8b949e;
            text-transform: uppercase;
        }

        .room-box input {
            width: 36px;
            background: transparent;
            border: none;
            color: #f85149;
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
            outline: none;
        }

        /* Grid de 4 cartas mazmorra */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            flex-shrink: 0;
            margin-top: 6px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 8px 6px;
            text-align: center;
            position: relative;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card.rolling {
            animation: shake 0.4s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        .card.flash {
            animation: flashAnim 0.3s ease;
        }

        @keyframes flashAnim {
            0% { background: #21262d; border-color: #f85149; }
            100% { background: #161b22; border-color: #30363d; }
        }

        .card-die {
            position: absolute;
            top: 3px;
            right: 5px;
            font-size: 0.55rem;
            color: #484f58;
            background: #0d1117;
            padding: 1px 4px;
            border-radius: 4px;
        }

        .card-icon {
            font-size: 1.4rem;
            display: block;
            margin-bottom: 1px;
        }

        .card-title {
            font-size: 0.6rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 3px;
        }

        .card-value {
            font-size: 1.6rem;
            font-weight: 800;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-value .placeholder {
            color: #30363d;
            font-size: 1.1rem;
        }

        .card-result {
            font-size: 0.65rem;
            font-weight: 600;
            min-height: 14px;
            line-height: 1.2;
            padding: 0 1px;
        }

        /* Colores */
        .c-size { color: #3fb950; }
        .c-doors { color: #d29922; }
        .c-enemies { color: #f85149; }
        .c-chests { color: #58a6ff; }
        .c-hero { color: #3fb950; }
        .c-enemy { color: #f85149; }

        /* Sección combate */
        .combat-section {
            flex-shrink: 0;
            margin-top: 6px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 8px;
        }

        .combat-header {
            text-align: center;
            font-size: 0.65rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .combat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .combat-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 8px 6px;
            text-align: center;
            position: relative;
            transition: all 0.2s ease;
        }

        .combat-card.rolling {
            animation: shake 0.4s ease-in-out infinite;
        }

        .combat-card.flash {
            animation: flashAnim 0.3s ease;
        }

        .combat-card.active-turn {
            border-color: #f85149;
            box-shadow: 0 0 8px rgba(248, 81, 73, 0.3);
        }

        .combat-card.hero-turn {
            border-color: #3fb950;
            box-shadow: 0 0 8px rgba(63, 185, 80, 0.3);
        }

        .combat-icon {
            font-size: 1.4rem;
            display: block;
            margin-bottom: 2px;
        }

        .combat-title {
            font-size: 0.6rem;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .combat-value {
            font-size: 1.6rem;
            font-weight: 800;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .combat-result {
            font-size: 0.65rem;
            font-weight: 600;
            min-height: 14px;
            line-height: 1.2;
        }

        .turn-indicator {
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            background: #f85149;
            color: #fff;
            font-size: 0.55rem;
            padding: 1px 8px;
            border-radius: 0 0 6px 6px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .turn-indicator.hero {
            background: #3fb950;
        }

        /* Botones */
        .btn-area {
            flex-shrink: 0;
            margin-top: 6px;
            display: flex;
            gap: 8px;
        }

        .btn-roll {
            flex: 1;
            background: #f85149;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.5px;
        }

        .btn-roll:active {
            transform: scale(0.97);
            background: #da3633;
        }

        .btn-roll:disabled {
            background: #484f58;
            color: #8b949e;
            cursor: not-allowed;
            transform: none;
        }

        .btn-combat {
            flex: 1;
            background: #a371f7;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.5px;
        }

        .btn-combat:active {
            transform: scale(0.97);
            background: #8957e5;
        }

        .btn-combat:disabled {
            background: #484f58;
            color: #8b949e;
            cursor: not-allowed;
            transform: none;
        }

        /* Historial */
        .log {
            flex: 1;
            min-height: 0;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #21262d;
            flex-shrink: 0;
        }

        .log-title {
            font-size: 0.7rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .log-clear {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 3px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .log-clear:active {
            background: #f85149;
            color: #fff;
        }

        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .log-entry {
            padding: 6px 12px;
            border-bottom: 1px solid #21262d;
            font-size: 0.8rem;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-room {
            color: #f85149;
            font-weight: 700;
            min-width: 50px;
            flex-shrink: 0;
        }

        .log-detail {
            color: #8b949e;
            line-height: 1.4;
        }

        .log-detail .emoji {
            margin-right: 2px;
        }

        .log-content::-webkit-scrollbar {
            width: 3px;
        }
        .log-content::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="title">🏰 Pocket Dungeon</div>
            <div class="room-box">
                <label>Hab.</label>
                <input type="number" id="roomNum" value="0" min="0" max="10">
            </div>
        </div>

        <!-- Grid mazmorra 2x2 -->
        <div class="grid">
            <div class="card" id="cardSize">
                <span class="card-die">d6</span>
                <span class="card-icon">📐</span>
                <div class="card-title">Tamaño</div>
                <div class="card-value"><span class="placeholder">-</span></div>
                <div class="card-result"></div>
            </div>
            <div class="card" id="cardDoors">
                <span class="card-die">d6</span>
                <span class="card-icon">🚪</span>
                <div class="card-title">Puertas</div>
                <div class="card-value"><span class="placeholder">-</span></div>
                <div class="card-result"></div>
            </div>
            <div class="card" id="cardEnemies">
                <span class="card-die">d6</span>
                <span class="card-icon">⚔️</span>
                <div class="card-title">Enemigos</div>
                <div class="card-value"><span class="placeholder">-</span></div>
                <div class="card-result"></div>
            </div>
            <div class="card" id="cardChests">
                <span class="card-die">d6</span>
                <span class="card-icon">📦</span>
                <div class="card-title">Cofres</div>
                <div class="card-value"><span class="placeholder">-</span></div>
                <div class="card-result"></div>
            </div>
        </div>

        <!-- Sección combate por turnos -->
        <div class="combat-section">
            <div class="combat-header">⚔️ Combate por Turnos</div>
            <div class="combat-grid">
                <div class="combat-card hero-turn" id="cardHero">
                    <span class="turn-indicator hero" id="heroTurn">TU TURNO</span>
                    <span class="combat-icon">🛡️</span>
                    <div class="combat-title">Tu Ataque</div>
                    <div class="combat-value"><span class="placeholder">-</span></div>
                    <div class="combat-result" id="heroResult"></div>
                </div>
                <div class="combat-card" id="cardEnemy">
                    <span class="turn-indicator" id="enemyTurn" style="display:none;">ENEMIGO</span>
                    <span class="combat-icon">👹</span>
                    <div class="combat-title">Ataque Enemigo</div>
                    <div class="combat-value"><span class="placeholder">-</span></div>
                    <div class="combat-result" id="enemyResult"></div>
                </div>
            </div>
        </div>

        <!-- Botones -->
        <div class="btn-area">
            <button class="btn-roll" id="btnRoll" onclick="rollAll()">🏰 MAZMORRA</button>
            <button class="btn-combat" id="btnCombat" onclick="nextCombatTurn()">⚔️ ATACAR</button>
        </div>

        <div class="log">
            <div class="log-header">
                <span class="log-title">📜 Historial</span>
                <button class="log-clear" onclick="clearLog()">Limpiar</button>
            </div>
            <div class="log-content" id="logContent"></div>
        </div>
    </div>

    <script>
        const TABLES = {
            size: {
                1: { val: 3, text: "Pasillo — 3 casillas" },
                2: { val: 3, text: "Pasillo — 3 casillas" },
                3: { val: 4, text: "Cuadrado 2×2" },
                4: { val: 4, text: "Cuadrado 2×2" },
                5: { val: 5, text: "Forma L o T — 5 casillas" },
                6: { val: 6, text: "Sala grande — 6 casillas" }
            },
            doors: {
                1: { val: 0, text: "Solo entrada" },
                2: { val: 0, text: "Solo entrada" },
                3: { val: 1, text: "1 puerta extra" },
                4: { val: 1, text: "1 puerta extra" },
                5: { val: 2, text: "2 puertas extra" },
                6: { val: 2, text: "2 puertas extra" }
            },
            enemies: {
                1: { val: 1, text: "1 enemigo" },
                2: { val: 1, text: "1 enemigo" },
                3: { val: 2, text: "2 enemigos" },
                4: { val: 2, text: "2 enemigos" },
                5: { val: 3, text: "3 enemigos" },
                6: { val: 3, text: "3 enemigos" }
            },
            chests: {
                1: { val: 0, text: "Sin cofre" },
                2: { val: 0, text: "Sin cofre" },
                3: { val: 0, text: "Sin cofre" },
                4: { val: 1, text: "1 cofre" },
                5: { val: 1, text: "1 cofre" },
                6: { val: 1, text: "1 cofre" }
            }
        };

        let combatState = 'hero'; // 'hero' o 'enemy'

        function getEnemyType(room) {
            if (room === 10) return "🐉 JEFE";
            if (room >= 7) return "👹 Bruto";
            if (room >= 4) return "👺 Bruto/Bicho";
            return "🐛 Bicho";
        }

        function rollD6() {
            return Math.floor(Math.random() * 6) + 1;
        }

        function rollAll() {
            const btn = document.getElementById('btnRoll');
            const roomInput = document.getElementById('roomNum');
            const room = parseInt(roomInput.value) || 0;

            btn.disabled = true;
            btn.textContent = 'Tirando...';

            const dSize = rollD6();
            const dDoors = rollD6();
            const dEnemies = rollD6();
            const dChests = rollD6();

            const resultSize = TABLES.size[dSize];
            const resultDoors = TABLES.doors[dDoors];
            const enemyResult = TABLES.enemies[dEnemies];
            const enemyType = getEnemyType(room);
            const enemyText = room === 10
                ? `${enemyResult.text} — ${enemyType}`
                : `${enemyResult.text} — ${enemyType}`;
            const resultEnemies = { val: enemyResult.val, text: enemyText };
            const resultChests = TABLES.chests[dChests];

            const cards = ['cardSize', 'cardDoors', 'cardEnemies', 'cardChests'];
            cards.forEach(id => {
                const card = document.getElementById(id);
                card.classList.add('rolling');
                const valueEl = card.querySelector('.card-value');
                const resultEl = card.querySelector('.card-result');
                valueEl.innerHTML = '<span class="placeholder">🎲</span>';
                resultEl.textContent = '';
            });

            let rolls = 0;
            const rollInterval = setInterval(() => {
                cards.forEach(id => {
                    const card = document.getElementById(id);
                    const valueEl = card.querySelector('.card-value');
                    valueEl.innerHTML = `<span style="color:#484f58">${rollD6()}</span>`;
                });
                rolls++;
                if (rolls >= 10) {
                    clearInterval(rollInterval);
                    showResults([
                        { id: 'cardSize', result: resultSize, color: 'c-size' },
                        { id: 'cardDoors', result: resultDoors, color: 'c-doors' },
                        { id: 'cardEnemies', result: resultEnemies, color: 'c-enemies' },
                        { id: 'cardChests', result: resultChests, color: 'c-chests' }
                    ]);
                    btn.disabled = false;
                    btn.textContent = '🏰 MAZMORRA';
                    addLog(room, dSize, dDoors, dEnemies, dChests);
                    if (room < 10) {
                        roomInput.value = room + 1;
                    }
                }
            }, 70);
        }

        function nextCombatTurn() {
            const btn = document.getElementById('btnCombat');
            btn.disabled = true;

            if (combatState === 'hero') {
                // Turno del héroe
                btn.textContent = 'Atacando...';
                const cardHero = document.getElementById('cardHero');
                const cardEnemy = document.getElementById('cardEnemy');

                cardHero.classList.add('rolling');
                const heroValue = cardHero.querySelector('.combat-value');
                const heroResult = document.getElementById('heroResult');
                heroValue.innerHTML = '<span class="placeholder">🎲</span>';
                heroResult.textContent = '';

                let rolls = 0;
                const interval = setInterval(() => {
                    heroValue.innerHTML = `<span style="color:#484f58">${rollD6()}</span>`;
                    rolls++;
                    if (rolls >= 10) {
                        clearInterval(interval);
                        const d6 = rollD6();
                        cardHero.classList.remove('rolling');
                        cardHero.classList.add('flash');
                        setTimeout(() => cardHero.classList.remove('flash'), 300);

                        let resultText = '';
                        if (d6 >= 4) {
                            resultText = '¡ACIERTO! Infliges 1 daño';
                        } else {
                            resultText = 'FALLO';
                        }

                        heroValue.innerHTML = `<span class="c-hero">${d6}</span>`;
                        heroResult.textContent = resultText;
                        heroResult.className = 'combat-result c-hero';

                        // Cambiar turno al enemigo
                        combatState = 'enemy';
                        document.getElementById('heroTurn').style.display = 'none';
                        document.getElementById('enemyTurn').style.display = 'block';
                        cardHero.classList.remove('hero-turn');
                        cardEnemy.classList.add('active-turn');

                        btn.disabled = false;
                        btn.textContent = '👹 ENEMIGO';
                    }
                }, 70);

            } else {
                // Turno del enemigo
                btn.textContent = 'Atacando...';
                const cardHero = document.getElementById('cardHero');
                const cardEnemy = document.getElementById('cardEnemy');

                cardEnemy.classList.add('rolling');
                const enemyValue = cardEnemy.querySelector('.combat-value');
                const enemyResult = document.getElementById('enemyResult');
                enemyValue.innerHTML = '<span class="placeholder">🎲</span>';
                enemyResult.textContent = '';

                let rolls = 0;
                const interval = setInterval(() => {
                    enemyValue.innerHTML = `<span style="color:#484f58">${rollD6()}</span>`;
                    rolls++;
                    if (rolls >= 10) {
                        clearInterval(interval);
                        const d6 = rollD6();
                        cardEnemy.classList.remove('rolling');
                        cardEnemy.classList.add('flash');
                        setTimeout(() => cardEnemy.classList.remove('flash'), 300);

                        let resultText = '';
                        if (d6 >= 4) {
                            resultText = '¡TE HACE DAÑO! -1 Vida';
                        } else {
                            resultText = 'FALLO. Te salvaste';
                        }

                        enemyValue.innerHTML = `<span class="c-enemy">${d6}</span>`;
                        enemyResult.textContent = resultText;
                        enemyResult.className = 'combat-result c-enemy';

                        // Cambiar turno al héroe
                        combatState = 'hero';
                        document.getElementById('enemyTurn').style.display = 'none';
                        document.getElementById('heroTurn').style.display = 'block';
                        cardEnemy.classList.remove('active-turn');
                        cardHero.classList.add('hero-turn');

                        btn.disabled = false;
                        btn.textContent = '⚔️ ATACAR';
                    }
                }, 70);
            }
        }

        function showResults(data) {
            data.forEach(item => {
                const card = document.getElementById(item.id);
                card.classList.remove('rolling');
                card.classList.add('flash');
                setTimeout(() => card.classList.remove('flash'), 300);

                const valueEl = card.querySelector('.card-value');
                const resultEl = card.querySelector('.card-result');
                valueEl.innerHTML = `<span class="${item.color}">${item.result.val}</span>`;
                resultEl.textContent = item.result.text;
                resultEl.className = `card-result ${item.color}`;
            });
        }

        function addLog(room, dSize, dDoors, dEnemies, dChests) {
            const logContent = document.getElementById('logContent');
            const enemyType = getEnemyType(room);
            const isBoss = room === 10;

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-room">H${room}${isBoss ? '⚡' : ''}</span>
                <span class="log-detail">
                    <span class="emoji">📐</span>${TABLES.size[dSize].val}
                    <span class="emoji">🚪</span>${TABLES.doors[dDoors].val}
                    <span class="emoji">⚔️</span>${TABLES.enemies[dEnemies].val} ${enemyType}
                    ${TABLES.chests[dChests].val ? '<span class="emoji">📦</span>Sí' : '<span class="emoji">📦</span>No'}
                </span>
            `;

            logContent.insertBefore(entry, logContent.firstChild);
        }

        function clearLog() {
            document.getElementById('logContent').innerHTML = '';
        }

        document.getElementById('roomNum').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                rollAll();
            }
        });
    </script>
</body>
</html>
